<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador PRO</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>💻 Cotizador PRO</h1>

<select id="modo">
  <option value="uso">Uso + Gama</option>
  <option value="presupuesto">Presupuesto + Uso</option>
</select>

<select id="uso">
  <option value="gaming">Gaming</option>
  <option value="oficina">Oficina</option>
  <option value="universidad">Universidad</option>
</select>

<select id="gama">
  <option value="baja">Baja</option>
  <option value="media">Media</option>
  <option value="alta">Alta</option>
</select>

<div id="presupuestoBox" style="display:none;">
  <input type="number" id="presupuesto" placeholder="Presupuesto Bs">
</div>

<button onclick="cotizar()">Cotizar</button>

<hr>

<h2>🧩 Configuración</h2>
<div id="config"></div>

<h2>💰 Total</h2>
<div id="total"></div>

<h2>⚠️ Sugerencias</h2>
<div id="sugerencias"></div>

<script src="data/productos.js"></script>
<script src="js/script.js"></script>

</body>
</html>
