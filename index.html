<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador IA</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>💻 Cotizador Inteligente</h1>

<select id="modo">
  <option value="uso">Uso + Gama</option>
  <option value="presupuesto">Presupuesto + Uso</option>
</select>

<select id="uso">
  <option value="oficina">Oficina</option>
  <option value="gaming">Gaming</option>
</select>

<select id="gama">
  <option value="baja">Baja</option>
  <option value="media">Media</option>
  <option value="alta">Alta</option>
</select>

<input type="number" id="presupuesto" placeholder="Presupuesto">

<button id="btnCotizar">Cotizar</button>

<h2>🔧 Editar componentes</h2>

<select id="cpuSelect"></select>
<select id="gpuSelect"></select>
<select id="ramSelect"></select>
<select id="placaSelect"></select>

<pre id="resultado"></pre>
<pre id="sugerencias"></pre>

<script src="data/productos.js"></script>
<script src="js/script.js"></script>

</body>
</html>
